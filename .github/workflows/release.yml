name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package archive
        run: |
          mkdir -p dist/env-arch
          cp install.sh archinstall.json dist/env-arch/
          tar -czf dist/env-arch.tar.gz -C dist env-arch

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: env-arch
          path: dist/env-arch.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/env-arch.tar.gz
          generate_release_notes: true
